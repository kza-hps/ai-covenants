<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>aiCOVENANTS — Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .row { padding: 18px 0; border-top: 1px solid var(--rule); }
  .row:first-of-type { border-top: 0; padding-top: 0; }
  .word { font-family: var(--font-archival); letter-spacing: var(--track-archival); font-weight: 500; text-transform: uppercase; }
  .ai { font-family: var(--font-display); text-transform: lowercase; letter-spacing: 0.02em; font-weight: 500; font-style: italic; margin-right: 0.06em; color: var(--stone-gold); }
  .meta { font-size: 11px; color: var(--fg-quiet); text-transform: uppercase; letter-spacing: var(--track-archival); margin-top: 6px; display: block; }
  .dark { background: var(--obsidian); color: var(--soft-ivory); padding: 18px; }
</style>
</head>
<body>
  <div class="row">
    <span class="word" style="font-size: 38px;"><span class="ai">ai</span>COVENANT</span>
    <span class="meta">Primary lockup · 38px+</span>
  </div>
  <div class="row dark">
    <span class="word" style="font-size: 38px; color: var(--stone-gold);"><span class="ai">ai</span>COVENANT</span>
    <span class="meta" style="color:#B6B0A2">Stone Gold on Obsidian — ceremonial use</span>
  </div>
  <div class="row">
    <span class="word" style="font-size: 16px;"><span class="ai">ai</span>COVENANT</span>
    <span class="meta">Header use · 16px</span>
  </div>
</body>
</html>
