<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>aiCOVENANTS — Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px 32px; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: 90px 1fr 60px; gap: 14px; align-items: center; padding: 6px 0; border-top: 1px solid var(--rule); font-size: 12px; }
  .row:first-of-type { border-top: 0; }
  .token { font-family: var(--font-mono); color: var(--fg-muted); }
  .bar { height: 8px; background: var(--obsidian); border-radius: 1px; }
  .px { font-family: var(--font-mono); color: var(--fg); text-align: right; }
</style>
</head>
<body>
  <div class="row"><span class="token">--s-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="token">--s-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="token">--s-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="token">--s-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="token">--s-5</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="token">--s-6</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="token">--s-7</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="token">--s-8</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
  <div class="row"><span class="token">--s-9</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
  <div class="row"><span class="token">--s-10</span><div class="bar" style="width:128px"></div><span class="px">128px</span></div>
</body>
</html>
