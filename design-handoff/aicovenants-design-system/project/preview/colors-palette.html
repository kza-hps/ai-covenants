<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>aiCOVENANTS — Palette</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .swatch { display: flex; flex-direction: column; }
  .chip {
    height: 110px; border: 1px solid var(--rule); border-radius: var(--r-2);
  }
  .meta-row { display: flex; flex-direction: column; gap: 2px; padding-top: 10px; }
  .name { font-family: var(--font-display); font-size: 17px; line-height: 1.2; color: var(--fg); }
  .hex { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-muted); letter-spacing: 0.04em; }
  .role { font-family: var(--font-body); font-size: 11px; color: var(--fg-quiet); text-transform: uppercase; letter-spacing: var(--track-archival); margin-top: 2px; }
</style>
</head>
<body>
<div class="grid">
  <div class="swatch">
    <div class="chip" style="background:#232A2F"></div>
    <div class="meta-row">
      <span class="name">Obsidian Charcoal</span>
      <span class="hex">#232A2F</span>
      <span class="role">Primary dark</span>
    </div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#D6C39A"></div>
    <div class="meta-row">
      <span class="name">Stone Gold</span>
      <span class="hex">#D6C39A</span>
      <span class="role">Sole accent</span>
    </div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#596066"></div>
    <div class="meta-row">
      <span class="name">Slate Mist</span>
      <span class="hex">#596066</span>
      <span class="role">Secondary neutral</span>
    </div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#F2EBDD"></div>
    <div class="meta-row">
      <span class="name">Soft Ivory</span>
      <span class="hex">#F2EBDD</span>
      <span class="role">Primary light</span>
    </div>
  </div>
</div>
</body>
</html>
