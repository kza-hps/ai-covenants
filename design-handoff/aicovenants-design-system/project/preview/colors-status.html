<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>aiCOVENANTS — Status colours</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg); font-family: var(--font-body); color: var(--fg); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    border-radius: var(--r-pill);
    padding: 6px 14px;
    font-size: 11px; text-transform: uppercase; letter-spacing: var(--track-archival);
    border: 1px solid var(--rule);
    background: var(--surface);
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .label { font-size: 11px; color: var(--fg-quiet); text-transform: uppercase; letter-spacing: var(--track-archival); margin-top: 14px; display: block; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-left: 10px; }
</style>
</head>
<body>
  <span class="label">Covenant status</span>
  <div class="row" style="margin-top:10px">
    <span class="chip"><span class="dot" style="background:#6B7F65"></span>Active</span>
    <span class="hex">#6B7F65</span>
    <span class="chip"><span class="dot" style="background:#D6C39A"></span>Pending</span>
    <span class="hex">#D6C39A</span>
    <span class="chip"><span class="dot" style="background:#8A6F6B"></span>Withdrawn</span>
    <span class="hex">#8A6F6B</span>
  </div>
  <span class="label" style="margin-top:24px">Quiet, derived neutrals — never electric.</span>
</body>
</html>
