<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>aiCOVENANTS — Tonal extensions</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg); font-family: var(--font-body); color: var(--fg); }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border: 1px solid var(--rule); border-radius: var(--r-1); }
  .lbl { font-size: 11px; line-height: 1.25; color: var(--fg); }
  .hex { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-quiet); }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#1A2024"></div><span class="lbl">Obsidian 700</span><span class="hex">#1A2024</span></div>
  <div class="sw"><div class="chip" style="background:#2C353B"></div><span class="lbl">Obsidian 500</span><span class="hex">#2C353B</span></div>
  <div class="sw"><div class="chip" style="background:#3A444B"></div><span class="lbl">Obsidian 400</span><span class="hex">#3A444B</span></div>
  <div class="sw"><div class="chip" style="background:#596066"></div><span class="lbl">Slate Mist</span><span class="hex">#596066</span></div>
  <div class="sw"><div class="chip" style="background:#8A9097"></div><span class="lbl">Slate 300</span><span class="hex">#8A9097</span></div>
  <div class="sw"><div class="chip" style="background:#A88E5A"></div><span class="lbl">Gold on light</span><span class="hex">#A88E5A</span></div>
  <div class="sw"><div class="chip" style="background:#C2AE83"></div><span class="lbl">Gold 300 (hover)</span><span class="hex">#C2AE83</span></div>
  <div class="sw"><div class="chip" style="background:#E0CFA9"></div><span class="lbl">Gold 200</span><span class="hex">#E0CFA9</span></div>
</div>
</body>
</html>
