<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>aiCOVENANTS — Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg); color: var(--fg); font-family: var(--font-body); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .panel { aspect-ratio: 1.4 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; border: 1px solid var(--rule); }
  .panel.dark { background: var(--obsidian); color: var(--soft-ivory); border-color: var(--rule-on-dark); }
  .panel img { height: 78px; width: auto; }
  .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: var(--track-archival); color: var(--fg-muted); }
  .panel.dark .lbl { color: #B6B0A2; }
</style>
</head>
<body>
  <div class="panel dark">
    <img src="../assets/mark-on-charcoal.png" alt="" />
    <span class="lbl">Mark · on Obsidian</span>
  </div>
  <div class="panel">
    <img src="../assets/mark-on-ivory.png" alt="" />
    <span class="lbl">Mark · on Soft Ivory</span>
  </div>
</body>
</html>
