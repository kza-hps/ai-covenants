<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>aiCOVENANTS — Radii & rules</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px 32px; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .swatch { width: 100%; height: 70px; background: var(--surface); border: 1px solid var(--rule-strong); }
  .lbl { font-size: 11px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: var(--track-archival); }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-quiet); }
  .section { margin-top: 22px; }
  .rule-demo { display: flex; flex-direction: column; gap: 14px; padding-top: 8px; }
  .hairline { height: 1px; background: var(--rule); }
  .hairline-strong { height: 1px; background: var(--rule-strong); }
  .lozenge-row { display: flex; align-items: center; gap: 12px; color: var(--accent-on-light); font-size: 14px; }
  .lozenge-row::before, .lozenge-row::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--rule) 30%, var(--rule) 70%, transparent); }
</style>
</head>
<body>
<div class="grid">
  <div class="item"><div class="swatch" style="border-radius:0"></div><span class="lbl">--r-0</span><span class="meta">0px · cards</span></div>
  <div class="item"><div class="swatch" style="border-radius:2px"></div><span class="lbl">--r-1</span><span class="meta">2px · buttons</span></div>
  <div class="item"><div class="swatch" style="border-radius:4px"></div><span class="lbl">--r-2</span><span class="meta">4px · max</span></div>
  <div class="item"><div class="swatch" style="border-radius:999px; height:32px; margin-top:18px;"></div><span class="lbl">--r-pill</span><span class="meta">status only</span></div>
</div>
<div class="section">
  <span class="lbl">Rules</span>
  <div class="rule-demo">
    <div class="hairline" title="--rule"></div>
    <div class="hairline-strong" title="--rule-strong"></div>
    <div class="lozenge-row">◆</div>
  </div>
</div>
</body>
</html>
