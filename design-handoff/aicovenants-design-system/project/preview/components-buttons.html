<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>aiCOVENANTS — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; padding: 6px 0; }
  .lbl { width: 130px; font-size: 11px; color: var(--fg-quiet); text-transform: uppercase; letter-spacing: var(--track-archival); }
  .btn {
    font-family: var(--font-body);
    font-size: 12px; font-weight: 500;
    text-transform: uppercase; letter-spacing: var(--track-archival);
    padding: 12px 22px;
    min-width: 168px;
    border-radius: var(--r-1);
    border: 1px solid transparent;
    cursor: pointer;
    transition: background var(--dur-quick) var(--ease-archival), color var(--dur-quick) var(--ease-archival), border-color var(--dur-quick) var(--ease-archival);
  }
  .btn-primary { background: var(--stone-gold); color: var(--obsidian); border-color: var(--stone-gold); }
  .btn-primary:hover { background: var(--gold-300); border-color: var(--gold-300); }
  .btn-primary:active { box-shadow: inset 0 0 0 1px rgba(35,42,47,0.35); }
  .btn-secondary { background: transparent; color: var(--obsidian); border-color: var(--obsidian); }
  .btn-secondary:hover { background: var(--obsidian); color: var(--soft-ivory); }
  .btn-administrative {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--fg-quiet);
    font-size: 11px;
    letter-spacing: var(--track-archival);
    padding: 9px 18px;
    min-width: 0;
    text-transform: uppercase;
    font-weight: 500;
  }
  .btn-administrative .glyph { font-family: var(--font-display); font-style: italic; text-transform: none; letter-spacing: 0; margin-right: 7px; color: var(--fg-muted); }
  .btn-administrative:hover { color: var(--status-withdrawn); border-color: var(--status-withdrawn); background: rgba(138,111,107,0.06); }
  .btn-administrative:hover .glyph { color: var(--status-withdrawn); }
  .btn-text { background: transparent; border: 0; color: var(--accent-on-light); padding: 8px 0; text-transform: none; letter-spacing: 0; font-size: 14px; text-decoration: underline; text-underline-offset: 4px; text-decoration-thickness: 1px; }
  .btn-disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">Primary</span><button class="btn btn-primary">Start a covenant</button><button class="btn btn-primary">View example</button></div>
  <div class="row"><span class="lbl">Secondary</span><button class="btn btn-secondary">Read the manifesto</button><button class="btn btn-secondary">View example</button></div>
  <div class="row"><span class="lbl">Tertiary</span><button class="btn btn-text">Read the full declaration →</button></div>
  <div class="row"><span class="lbl">Administrative</span><button class="btn btn-administrative"><span class="glyph">§</span>Record withdrawal</button><span class="lbl" style="width:auto;color:var(--fg-muted);text-transform:none;letter-spacing:0;font-size:12px;font-style:italic;font-family:var(--font-display)">Cautionary public-record action — not a peer CTA.</span></div>
  <div class="row"><span class="lbl">Disabled</span><button class="btn btn-primary btn-disabled" disabled>Publish</button></div>
</body>
</html>
